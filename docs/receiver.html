<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>OmniCast Audio+Video Receiver</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
        }
        #remoteVideo {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            transform: translate(-50%, -50%);
            transform-origin: center center;
            display: none;
        }
        #audioPlayer {
            display: none;
        }
        #status {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 18px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 5px;
            z-index: 1000;
        }
        #audioVisualizer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            font-family: Arial, sans-serif;
        }
        #audioTitle {
            font-size: 36px;
            margin-bottom: 20px;
        }
        #audioWaveform {
            font-size: 72px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="status">Waiting for connection...</div>
    <video id="remoteVideo" autoplay playsinline></video>
    <audio id="audioPlayer" autoplay></audio>
    
    <div id="audioVisualizer" style="display: none;">
        <div id="audioTitle">🎵 OmniCast Audio</div>
        <div id="audioWaveform">♪ ♫ ♪ ♫ ♪</div>
    </div>

    <script>
        const WEBRTC_NAMESPACE = 'urn:x-cast:com.omnicast.webrtc';
        const MEDIA_NAMESPACE = 'urn:x-cast:com.google.cast.media';
        
        let peerConnection = null;
        let castContext = null;
        const statusDiv = document.getElementById('status');
        const remoteVideo = document.getElementById('remoteVideo');
        const audioPlayer = document.getElementById('audioPlayer');
        const audioVisualizer = document.getElementById('audioVisualizer');
        let messageCount = 0;
        let currentMode = null; // 'audio' or 'video'
        let orientationValue = 1;
        let videoTelemetryStarted = false;
        let lastRenderedFrameAtMs = 0;
        let lastRenderedFrameCount = 0;
        let suppressVideoStateEvents = false;
        let activeVideoStream = null;
        let lastPlaybackRetryAtMs = 0;
        let lastKeyframeRecoveryAtMs = 0;
        let lastVideoElementResetAtMs = 0;
        let hasRenderedVideoFrame = false;
        let videoRecoveryArmedAtMs = 0;

        // A/V sync: collect tracks and start playback only when both are ready
        let pendingVideoTrack = null;
        let pendingAudioTrack = null;
        let avSyncStarted = false;
        
        function updateStatus(message) {
            console.log('[OmniCast Receiver]', message);
            statusDiv.textContent = message;
            statusDiv.style.opacity = '1';
            
            // Hide status after 3 seconds if connected
            if (message.includes('Connected') || message.includes('Streaming') || message.includes('Playing')) {
                setTimeout(() => {
                    statusDiv.style.opacity = '0';
                }, 3000);
            }
        }

        function requestVideoRecovery(reason, options = {}) {
            if (currentMode !== 'video') return;

            const now = Date.now();
            const {
                forceElementReset = false,
                requestKeyframe = true,
                retryPlayback = true
            } = options;
            const recoveryReady = hasRenderedVideoFrame && now >= videoRecoveryArmedAtMs;

            console.warn(`[ReceiverAVVideo] recovery reason=${reason} paused=${remoteVideo.paused} readyState=${remoteVideo.readyState} currentTime=${remoteVideo.currentTime.toFixed(3)}`);

            if (retryPlayback && now - lastPlaybackRetryAtMs >= 500) {
                lastPlaybackRetryAtMs = now;
                if (!remoteVideo.srcObject && activeVideoStream) {
                    remoteVideo.srcObject = activeVideoStream;
                }
                remoteVideo.play().catch((error) => {
                    console.warn('[ReceiverAVVideo] recovery play() failed:', error);
                });
            }

            if (requestKeyframe && recoveryReady && now - lastKeyframeRecoveryAtMs >= 800) {
                lastKeyframeRecoveryAtMs = now;
                sendWebRTCMessage({
                    type: 'requestKeyFrame',
                    reason
                });
            }

            if (forceElementReset && recoveryReady && activeVideoStream && now - lastVideoElementResetAtMs >= 2500) {
                lastVideoElementResetAtMs = now;
                const stream = activeVideoStream;
                runWithSuppressedVideoStateEvents(() => {
                    remoteVideo.pause();
                    remoteVideo.srcObject = null;
                });
                setTimeout(() => {
                    remoteVideo.srcObject = stream;
                    remoteVideo.play().catch((error) => {
                        console.warn('[ReceiverAVVideo] element reset play() failed:', error);
                    });
                }, 0);
            }
        }

        function startVideoTelemetry(video, label) {
            if (videoTelemetryStarted) return;
            videoTelemetryStarted = true;

            ['play', 'playing', 'pause', 'waiting', 'stalled', 'ended', 'error'].forEach((eventName) => {
                video.addEventListener(eventName, () => {
                    console.log(`[${label}] event=${eventName} paused=${video.paused} readyState=${video.readyState} currentTime=${video.currentTime.toFixed(3)}`);
                    if (currentMode !== 'video' || suppressVideoStateEvents) return;
                    if (eventName === 'playing' || eventName === 'play') {
                        lastRenderedFrameAtMs = Date.now();
                        sendMediaStatus(0, 'PLAYING');
                    } else if (eventName === 'pause') {
                        sendMediaStatus(0, 'PAUSED');
                    } else if (eventName === 'waiting') {
                        requestVideoRecovery(`video_event_${eventName}`, {
                            requestKeyframe: false,
                            forceElementReset: false
                        });
                    } else if (eventName === 'stalled') {
                        requestVideoRecovery(`video_event_${eventName}`);
                    } else if (eventName === 'ended' || eventName === 'error') {
                        requestVideoRecovery(`video_event_${eventName}`, {
                            forceElementReset: eventName === 'error'
                        });
                        sendMediaStatus(0, 'IDLE');
                    }
                });
            });

            setInterval(() => {
                if (typeof video.requestVideoFrameCallback !== 'function') {
                    const quality = typeof video.getVideoPlaybackQuality === 'function'
                        ? video.getVideoPlaybackQuality()
                        : null;
                    const renderedFrames =
                        quality && Number.isFinite(quality.totalVideoFrames)
                            ? quality.totalVideoFrames
                            : (typeof video.webkitDecodedFrameCount === 'number'
                                ? video.webkitDecodedFrameCount
                                : 0);
                    if (renderedFrames > lastRenderedFrameCount) {
                        hasRenderedVideoFrame = true;
                        lastRenderedFrameCount = renderedFrames;
                        lastRenderedFrameAtMs = Date.now();
                        if (renderedFrames === 1 || renderedFrames % 60 === 0) {
                            console.log(`[${label}] rendered renderedFrames=${renderedFrames} currentTime=${video.currentTime.toFixed(3)}`);
                        }
                    }
                }
                const now = Date.now();
                if (!video.paused && video.readyState >= 2 && lastRenderedFrameAtMs > 0 && now - lastRenderedFrameAtMs >= 1500) {
                    const gapMs = now - lastRenderedFrameAtMs;
                    console.warn(`[${label}] render-stall gapMs=${gapMs} currentTime=${video.currentTime.toFixed(3)}`);
                    requestVideoRecovery('render_stall', {
                        forceElementReset: gapMs >= 3000
                    });
                }
            }, 1000);

            if (typeof video.requestVideoFrameCallback === 'function') {
                const onFrame = (_, metadata) => {
                    hasRenderedVideoFrame = true;
                    lastRenderedFrameAtMs = Date.now();
                    if (metadata.presentedFrames === 1 || metadata.presentedFrames % 60 === 0) {
                        console.log(`[${label}] rendered presentedFrames=${metadata.presentedFrames} mediaTime=${metadata.mediaTime?.toFixed?.(3) ?? 'n/a'}`);
                    }
                    video.requestVideoFrameCallback(onFrame);
                };
                video.requestVideoFrameCallback(onFrame);
            }
        }

        function runWithSuppressedVideoStateEvents(work) {
            suppressVideoStateEvents = true;
            try {
                work();
            } finally {
                setTimeout(() => {
                    suppressVideoStateEvents = false;
                }, 0);
            }
        }

        function applyVideoLayout() {
            if (!remoteVideo) return;

            const videoW = remoteVideo.videoWidth || 0;
            const videoH = remoteVideo.videoHeight || 0;
            const screenW = window.innerWidth;
            const screenH = window.innerHeight;
            const isLandscapeDisplay = screenW > screenH;
            const isPortraitEncoded = videoW > 0 && videoH > 0 && videoH > videoW;

            // Chromecast/WebRTC can already apply CVO orientation metadata.
            // Manual rotation should be applied only when stream remains portrait-coded
            // on a landscape display, otherwise we risk double-rotation (upside-down).
            let effectiveRotationDeg = 0;
            if ((orientationValue === 6 || orientationValue === 8) && isLandscapeDisplay && isPortraitEncoded) {
                effectiveRotationDeg = orientationValue === 6 ? -90 : 90;
            } else if (orientationValue === 3) {
                effectiveRotationDeg = 180;
            }

            const rightAngle = Math.abs(effectiveRotationDeg) === 90;

            // Pick object-fit based on the *displayed* (post-rotation) aspect vs the TV.
            // - Landscape-displayed video on a mismatched landscape TV: use `cover` to fill
            //   the screen (iPhone 19.5:9 vs TV 16:9 would otherwise leave thick bars).
            //   A small edge crop (~9% per side) is better than huge black bars.
            // - Portrait-displayed video on a landscape TV: keep `contain` — cropping a
            //   portrait phone to fill a landscape TV would lose a large part of the image.
            // - Near-matching aspects (< 2% delta): keep `contain` since bars wouldn't be
            //   visible anyway and we avoid unnecessary edge crop.
            const displayedW = videoW > 0 && videoH > 0 ? (rightAngle ? videoH : videoW) : 0;
            const displayedH = videoW > 0 && videoH > 0 ? (rightAngle ? videoW : videoH) : 0;
            const displayedAspect = displayedH > 0 ? (displayedW / displayedH) : 0;
            const screenAspect = screenH > 0 ? (screenW / screenH) : 0;
            const aspectDelta = (displayedAspect > 0 && screenAspect > 0)
                ? Math.abs(displayedAspect - screenAspect) / screenAspect
                : 0;
            const displayedIsLandscape = displayedW > 0 && displayedW > displayedH;
            const fitMode = (displayedIsLandscape && aspectDelta > 0.02) ? 'cover' : 'contain';

            remoteVideo.style.objectFit = fitMode;
            remoteVideo.style.width = rightAngle ? '100vh' : '100vw';
            remoteVideo.style.height = rightAngle ? '100vw' : '100vh';
            remoteVideo.style.transform = 'translate(-50%, -50%) rotate(' + effectiveRotationDeg + 'deg)';
            console.log('[ReceiverLayout] Applied ' + fitMode + ' layout video=' + videoW + 'x' + videoH + ' displayed=' + displayedW + 'x' + displayedH + ' screen=' + screenW + 'x' + screenH + ' orientation=' + orientationValue + ' rotation=' + effectiveRotationDeg + 'deg aspectDelta=' + (aspectDelta * 100).toFixed(1) + '% portraitEncoded=' + isPortraitEncoded);
        }

        function applyOrientationMessage(value) {
            // iOS/ReplayKit orientation attachment values:
            // 1 = portrait, 3 = portrait upside-down, 6 = landscape-left, 8 = landscape-right
            orientationValue = Number(value) || 1;
            console.log('[ReceiverLayout] Orientation message value=' + orientationValue);
            applyVideoLayout();
        }
        
        // ==================== AUDIO STREAMING ====================
        
        function handleMediaLoad(data) {
            try {
                updateStatus('Loading audio...');
                console.log('[Audio] Received LOAD command - full data:', JSON.stringify(data, null, 2));
                
                const media = data.media || {};
                const contentId = media.contentId;
                const contentType = media.contentType || 'audio/x-wav';
                
                console.log('[Audio] Extracted media object:', media);
                console.log('[Audio] Extracted contentId:', contentId);
                console.log('[Audio] ContentId type:', typeof contentId);
                
                if (!contentId || contentId === '') {
                    console.error('[Audio] No contentId in media - data:', data);
                    console.error('[Audio] Media keys:', Object.keys(media));
                    updateStatus('❌ No audio URL provided (contentId is empty)');
                    return;
                }
                
                console.log('[Audio] Loading:', contentId);
                console.log('[Audio] Type:', contentType);
                
                // Switch to audio mode
                currentMode = 'audio';
                if (peerConnection) {
                    try { peerConnection.close(); } catch (_) {}
                    peerConnection = null;
                }
                runWithSuppressedVideoStateEvents(() => {
                    remoteVideo.pause();
                    remoteVideo.srcObject = null;
                });
                lastRenderedFrameAtMs = 0;
                lastRenderedFrameCount = 0;
                remoteVideo.style.display = 'none';
                audioVisualizer.style.display = 'block';
                
                // Load and play audio
                console.log('[Audio] Setting audioPlayer.src to:', contentId);
                audioPlayer.src = contentId;
                console.log('[Audio] audioPlayer.src is now:', audioPlayer.src);
                audioPlayer.load();
                console.log('[Audio] audioPlayer.load() called');
                
                audioPlayer.oncanplay = () => {
                    console.log('[Audio] Ready to play');
                    updateStatus('🎵 Starting playback...');
                    audioPlayer.play().then(() => {
                        updateStatus('🎵 Playing audio');
                        console.log('[Audio] Playing successfully');
                        console.log('[Audio] Audio src:', audioPlayer.src);
                        console.log('[Audio] Audio duration:', audioPlayer.duration);
                        console.log('[Audio] Audio readyState:', audioPlayer.readyState);
                        
                        // Send MEDIA_STATUS response
                        sendMediaStatus(data.requestId, 'PLAYING');
                    }).catch(error => {
                        console.error('[Audio] Play error:', error);
                        updateStatus('❌ Playback error: ' + error.message);
                        sendMediaStatus(data.requestId, 'IDLE');
                    });
                };
                
                audioPlayer.onerror = (e) => {
                    const errorCode = audioPlayer.error ? audioPlayer.error.code : 'unknown';
                    const errorMessage = audioPlayer.error ? audioPlayer.error.message : 'Unknown error';
                    console.error('[Audio] Load error code:', errorCode);
                    console.error('[Audio] Load error message:', errorMessage);
                    console.error('[Audio]  Audio src:', audioPlayer.src);
                    updateStatus('❌ Load error: ' + errorCode + ' - ' + errorMessage);
                    sendMediaStatus(data.requestId, 'IDLE');
                };
                
                audioPlayer.onplaying = () => {
                    console.log('[Audio] Now playing');
                    updateStatus('🔊 Audio streaming');
                };
                
                audioPlayer.onstalled = () => {
                    console.warn('[Audio] Playback stalled');
                };
                
                audioPlayer.onwaiting = () => {
                    console.warn('[Audio] Buffering...');
                    updateStatus('⏳ Buffering...');
                };
                
                audioPlayer.onended = () => {
                    console.log('[Audio] Playback ended');
                    updateStatus('Audio ended');
                    sendMediaStatus(data.requestId, 'IDLE');
                };
                
            } catch (error) {
                console.error('[Audio] Error in handleMediaLoad:', error);
                updateStatus('❌ Error: ' + error.message);
            }
        }
        
        function sendMediaStatus(requestId, playerState) {
            if (!castContext) return;

            const activeElement =
                currentMode === 'video' ? remoteVideo :
                currentMode === 'audio' ? audioPlayer :
                null;
            const currentTime = activeElement && Number.isFinite(activeElement.currentTime) ? activeElement.currentTime : 0;
            const volumeLevel =
                activeElement && typeof activeElement.volume === 'number' && Number.isFinite(activeElement.volume)
                    ? activeElement.volume
                    : 1;
            const muted =
                activeElement && typeof activeElement.muted === 'boolean'
                    ? activeElement.muted
                    : false;
            
            const status = {
                type: 'MEDIA_STATUS',
                requestId: requestId || 0,
                status: [{
                    mediaSessionId: 1,
                    playbackRate: 1,
                    playerState: playerState,
                    currentTime: currentTime,
                    supportedMediaCommands: 15,
                    volume: {
                        level: volumeLevel,
                        muted: muted
                    }
                }]
            };
            
            console.log('[Audio] Sending status:', playerState);
            castContext.sendCustomMessage(MEDIA_NAMESPACE, undefined, status);
        }
        
        function handleMediaCommand(event) {
            try {
                console.log('[Audio] Received custom message');
                console.log('[Audio] Event:', event);
                console.log('[Audio] Sender ID:', event.senderId);
                
                // Cast SDK may auto-parse JSON
                let data;
                if (typeof event.data === 'string') {
                    console.log('[Audio] Parsing JSON string');
                    data = JSON.parse(event.data);
                } else {
                    console.log('[Audio] Data already parsed');
                    data = event.data;
                }
                
                console.log('[Audio] Command type:', data.type);
                console.log('[Audio] Full data:', data);
                
                switch (data.type) {
                    case 'LOAD':
                        handleMediaLoad(data);
                        break;
                    case 'PLAY':
                        console.log('[Audio] PLAY command');
                        if (currentMode === 'video') {
                            remoteVideo.play().catch((error) => {
                                console.warn('[WebRTC] remoteVideo.play() failed during PLAY:', error);
                            });
                        } else {
                            audioPlayer.play();
                        }
                        sendMediaStatus(data.requestId, 'PLAYING');
                        break;
                    case 'PAUSE':
                        console.log('[Audio] PAUSE command');
                        if (currentMode === 'video') {
                            remoteVideo.pause();
                        } else {
                            audioPlayer.pause();
                        }
                        sendMediaStatus(data.requestId, 'PAUSED');
                        break;
                    case 'STOP':
                        console.log('[Audio] STOP command');
                        if (currentMode === 'video') {
                            runWithSuppressedVideoStateEvents(() => {
                                remoteVideo.pause();
                                remoteVideo.srcObject = null;
                            });
                            activeVideoStream = null;
                            hasRenderedVideoFrame = false;
                            videoRecoveryArmedAtMs = 0;
                            if (peerConnection) {
                                try { peerConnection.close(); } catch (_) {}
                                peerConnection = null;
                            }
                            lastRenderedFrameAtMs = 0;
                            lastRenderedFrameCount = 0;
                        } else {
                            audioPlayer.pause();
                            audioPlayer.currentTime = 0;
                            audioPlayer.src = '';
                        }
                        currentMode = null;
                        sendMediaStatus(data.requestId, 'IDLE');
                        break;
                    case 'GET_STATUS':
                        console.log('[Audio] GET_STATUS command');
                        if (currentMode === 'video') {
                            sendMediaStatus(data.requestId, remoteVideo.paused ? 'PAUSED' : 'PLAYING');
                        } else if (currentMode === 'audio') {
                            sendMediaStatus(data.requestId, audioPlayer.paused ? 'PAUSED' : 'PLAYING');
                        } else {
                            sendMediaStatus(data.requestId, 'IDLE');
                        }
                        break;
                    // Queue / track / volume probes from CAF, Google Home app, the Cast
                    // quick-settings tile, etc. We don't support a queue, but we must reply
                    // gracefully (or stay silent) instead of treating them as user-facing
                    // errors. Without these cases, every probe rendered "❓ Unknown command"
                    // on the TV.
                    case 'QUEUE_GET_ITEM_IDS':
                    case 'QUEUE_GET_ITEMS_INFO':
                    case 'QUEUE_GET_ITEM_RANGE':
                    case 'QUEUE_LOAD':
                    case 'QUEUE_INSERT':
                    case 'QUEUE_UPDATE':
                    case 'QUEUE_REMOVE':
                    case 'QUEUE_REORDER':
                    case 'QUEUE_NEXT':
                    case 'QUEUE_PREV':
                    case 'EDIT_TRACKS_INFO':
                    case 'SET_VOLUME':
                    case 'SET_PLAYBACK_RATE':
                    case 'PRECACHE':
                    case 'PRELOAD':
                    case 'SEEK':
                        console.log('[Audio] Ignoring unsupported media command:', data.type);
                        // Reply with current status so the sender's request resolves
                        // instead of timing out.
                        if (typeof data.requestId === 'number') {
                            const playerState = currentMode === 'video'
                                ? (remoteVideo.paused ? 'PAUSED' : 'PLAYING')
                                : currentMode === 'audio'
                                    ? (audioPlayer.paused ? 'PAUSED' : 'PLAYING')
                                    : 'IDLE';
                            sendMediaStatus(data.requestId, playerState);
                        }
                        break;
                    default:
                        // Don't surface protocol noise on screen — just log it.
                        console.log('[Audio] Unhandled media command:', data.type);
                }
            } catch (error) {
                console.error('[Audio] Command error:', error);
                console.error('[Audio] Stack:', error.stack);
                updateStatus('❌ Error: ' + error.message);
            }
        }
        
        // ==================== WEBRTC VIDEO STREAMING ====================
        
        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };
        
        function initializePeerConnection() {
            if (peerConnection) {
                peerConnection.close();
            }
            
            updateStatus('Creating peer connection...');
            peerConnection = new RTCPeerConnection(rtcConfig);

            // Pre-configure recvonly transceivers so Chromecast can accept sendonly offers
            peerConnection.addTransceiver('video', { direction: 'recvonly' });
            peerConnection.addTransceiver('audio', { direction: 'recvonly' });

            // Prefer H.264 for video (Chromecast HW decode)
            try {
                const transceivers = peerConnection.getTransceivers();
                for (const t of transceivers) {
                    if (t.receiver && t.receiver.track && t.receiver.track.kind === 'video') {
                        const caps = RTCRtpReceiver.getCapabilities('video');
                        if (caps) {
                            const h264 = caps.codecs.filter(c => c.mimeType === 'video/H264');
                            const rest = caps.codecs.filter(c => c.mimeType !== 'video/H264');
                            if (h264.length > 0) {
                                t.setCodecPreferences([...h264, ...rest]);
                                console.log('[WebRTC] Set codec preferences: H.264 first (' + h264.length + ' profiles)');
                            }
                        }
                    }
                }
            } catch (e) {
                console.warn('[WebRTC] Could not set codec preferences:', e);
            }
            
            // Switch to video mode
            currentMode = 'video';
            activeVideoStream = null;
            hasRenderedVideoFrame = false;
            videoRecoveryArmedAtMs = Date.now() + 2000;
            pendingVideoTrack = null;
            pendingAudioTrack = null;
            avSyncStarted = false;
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            audioPlayer.src = '';
            runWithSuppressedVideoStateEvents(() => {
                remoteVideo.pause();
                remoteVideo.srcObject = null;
            });
            lastRenderedFrameAtMs = 0;
            lastRenderedFrameCount = 0;
            audioVisualizer.style.display = 'none';
            remoteVideo.style.display = 'block';
            
            peerConnection.ontrack = (event) => {
                console.log('[WebRTC] Track received:', event.track.kind);

                // Collect tracks — start playback only when both arrive (A/V sync)
                if (event.track.kind === 'video') {
                    pendingVideoTrack = event.track;
                } else if (event.track.kind === 'audio') {
                    pendingAudioTrack = event.track;
                }

                if (pendingVideoTrack && pendingAudioTrack && !avSyncStarted) {
                    avSyncStarted = true;
                    console.log('[WebRTC] Both tracks received — starting synchronized playback');

                    // Build a single stream with both tracks for browser-level A/V sync
                    const stream = new MediaStream([pendingVideoTrack, pendingAudioTrack]);
                    activeVideoStream = stream;
                    remoteVideo.srcObject = stream;

                    // Start muted; unmute when first video frame renders
                    remoteVideo.muted = true;
                    remoteVideo.play().then(() => {
                        console.log('[WebRTC] play() succeeded (muted), waiting for first frame');
                        sendMediaStatus(0, 'PLAYING');
                    }).catch((error) => {
                        console.warn('[WebRTC] remoteVideo.play() failed:', error);
                        sendMediaStatus(0, 'PAUSED');
                    });

                    // Unmute after first video frame renders
                    if (typeof remoteVideo.requestVideoFrameCallback === 'function') {
                        remoteVideo.requestVideoFrameCallback(() => {
                            console.log('[WebRTC] First video frame rendered — unmuting audio');
                            remoteVideo.muted = false;
                        });
                    } else {
                        // Fallback: unmute on loadeddata or after short delay
                        remoteVideo.addEventListener('loadeddata', () => {
                            console.log('[WebRTC] loadeddata — unmuting audio');
                            remoteVideo.muted = false;
                        }, { once: true });
                    }

                    startVideoTelemetry(remoteVideo, 'ReceiverAVVideo');
                    updateStatus('Streaming video+audio');
                } else {
                    updateStatus('Received ' + event.track.kind + ' track, waiting for ' + (pendingVideoTrack ? 'audio' : 'video'));
                }

                remoteVideo.onloadedmetadata = () => {
                    applyVideoLayout();
                };
                remoteVideo.onresize = () => {
                    applyVideoLayout();
                };
            };
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    console.log('[WebRTC] Generated ICE candidate');
                    const message = {
                        type: 'iceCandidate',
                        candidate: event.candidate.candidate,
                        sdpMid: event.candidate.sdpMid,
                        sdpMLineIndex: event.candidate.sdpMLineIndex
                    };
                    sendWebRTCMessage(message);
                }
            };
            
            peerConnection.onconnectionstatechange = () => {
                console.log('[WebRTC] Connection state:', peerConnection.connectionState);
                updateStatus('Connection: ' + peerConnection.connectionState);
                
                if (peerConnection.connectionState === 'connected') {
                    updateStatus('🎥 Connected - Streaming');
                } else if (peerConnection.connectionState === 'failed') {
                    updateStatus('❌ Connection failed');
                }
            };
        }
        
        function sendWebRTCMessage(message) {
            if (!castContext) return;
            castContext.sendCustomMessage(WEBRTC_NAMESPACE, undefined, message);
        }
        
        async function handleOffer(data) {
            try {
                updateStatus('Processing offer...');
                console.log('[WebRTC] Received offer');
                
                initializePeerConnection();
                
                const offer = new RTCSessionDescription({
                    type: 'offer',
                    sdp: data.sdp
                });
                
                await peerConnection.setRemoteDescription(offer);
                console.log('[WebRTC] Remote description set');
                
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                console.log('[WebRTC] Local description set');
                
                const answerMessage = {
                    type: 'answer',
                    sdp: answer.sdp
                };
                sendWebRTCMessage(answerMessage);
                updateStatus('Answer sent, establishing connection...');
                
            } catch (error) {
                console.error('[WebRTC] Error handling offer:', error);
                updateStatus('❌ Error: ' + error.message);
            }
        }
        
        async function handleIceCandidate(data) {
            try {
                if (!peerConnection) {
                    console.warn('[WebRTC] Peer connection not initialized for ICE candidate');
                    return;
                }
                
                const candidate = new RTCIceCandidate({
                    candidate: data.candidate,
                    sdpMid: data.sdpMid,
                    sdpMLineIndex: data.sdpMLineIndex
                });
                
                await peerConnection.addIceCandidate(candidate);
                console.log('[WebRTC] ICE candidate added');
                
            } catch (error) {
                console.error('[WebRTC] Error adding ICE candidate:', error);
            }
        }
        
        function handleWebRTCMessage(event) {
            try {
                messageCount++;
                
                let data;
                if (typeof event.data === 'string') {
                    data = JSON.parse(event.data);
                } else {
                    data = event.data;
                }
                
                console.log('[WebRTC] Message type:', data.type);
                
                switch (data.type) {
                    case 'offer':
                        handleOffer(data);
                        break;
                    case 'iceCandidate':
                        handleIceCandidate(data);
                        break;
                    case 'orientation':
                        applyOrientationMessage(data.value);
                        break;
                    default:
                        console.log('[WebRTC] Unknown message type:', data.type);
                }
            } catch (error) {
                console.error('[WebRTC] Error parsing message:', error);
            }
        }
        
        // ==================== CAST RECEIVER INITIALIZATION ====================
        
        window.addEventListener('load', () => {
            updateStatus('Initializing Cast Receiver...');

            window.addEventListener('resize', () => {
                applyVideoLayout();
            });
            
            const context = cast.framework.CastReceiverContext.getInstance();
            castContext = context;
            
            context.addEventListener(cast.framework.system.EventType.SENDER_CONNECTED, () => {
                console.log('[Cast] Sender connected');
                updateStatus('📱 Sender connected - Ready');
            });
            
            context.addEventListener(cast.framework.system.EventType.SENDER_DISCONNECTED, () => {
                console.log('[Cast] Sender disconnected');
                updateStatus('Sender disconnected');
                
                // Clean up
                if (audioPlayer.src) {
                    audioPlayer.pause();
                    audioPlayer.src = '';
                }
                remoteVideo.pause();
                remoteVideo.srcObject = null;
                activeVideoStream = null;
                hasRenderedVideoFrame = false;
                videoRecoveryArmedAtMs = 0;
                if (peerConnection) {
                    peerConnection.close();
                    peerConnection = null;
                }
                lastRenderedFrameAtMs = 0;
                lastRenderedFrameCount = 0;
                currentMode = null;
            });
            
            // Listen for WebRTC messages
            context.addCustomMessageListener(WEBRTC_NAMESPACE, handleWebRTCMessage);
            console.log('[Cast] Listening on namespace:', WEBRTC_NAMESPACE);
            
            // Listen for Media messages (for audio)
            context.addCustomMessageListener(MEDIA_NAMESPACE, handleMediaCommand);
            console.log('[Cast] Listening on namespace:', MEDIA_NAMESPACE);
            
            const options = new cast.framework.CastReceiverOptions();
            options.disableIdleTimeout = true;
            
            context.start(options);
            updateStatus('✅ Ready for Audio or Video');
            console.log('[Cast] Receiver started and ready');
        });
    </script>
