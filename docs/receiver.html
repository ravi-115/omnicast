<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>OmniCast Audio+Video Receiver V2</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
        }
        #remoteVideo {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            transform: translate(-50%, -50%);
            transform-origin: center center;
            display: none;
        }
        #audioPlayer {
            display: none;
        }
        #status {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 18px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 5px;
            z-index: 1000;
        }
        #audioVisualizer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            font-family: Arial, sans-serif;
        }
        #audioTitle {
            font-size: 36px;
            margin-bottom: 20px;
        }
        #audioWaveform {
            font-size: 72px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="status">Waiting for connection...</div>
    <video id="remoteVideo" autoplay playsinline></video>
    <audio id="audioPlayer" autoplay></audio>

    <div id="audioVisualizer" style="display: none;">
        <div id="audioTitle">🎵 OmniCast Audio</div>
        <div id="audioWaveform">♪ ♫ ♪ ♫ ♪</div>
    </div>

    <script>
        const WEBRTC_NAMESPACE = 'urn:x-cast:com.omnicast.webrtc';
        const MEDIA_NAMESPACE = 'urn:x-cast:com.google.cast.media';

        const statusDiv = document.getElementById('status');
        const remoteVideo = document.getElementById('remoteVideo');
        const audioPlayer = document.getElementById('audioPlayer');
        const audioVisualizer = document.getElementById('audioVisualizer');

        const state = {
            castContext: null,
            peerConnection: null,
            activeMode: null,
            orientationValue: 1,
            activeVideoStream: null,
            receiverState: 'detached',
            currentRequestId: 0,
            renderTelemetryStarted: false,
            hasRenderedVideoFrame: false,
            lastRenderedFrameAtMs: 0,
            lastRenderedFrameCount: 0,
            lastRecoveryRequestAtMs: 0
        };

        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        function updateStatus(message) {
            console.log('[OmniCast Receiver V2]', message);
            statusDiv.textContent = message;
            statusDiv.style.opacity = '1';
            if (message.includes('Connected') || message.includes('Streaming') || message.includes('Playing')) {
                setTimeout(() => {
                    statusDiv.style.opacity = '0';
                }, 3000);
            }
        }

        function setReceiverState(nextState, extra = '') {
            state.receiverState = nextState;
            console.log(`[ReceiverV2] state=${nextState}${extra ? ' ' + extra : ''}`);
        }

        function sendWebRTCMessage(message) {
            if (!state.castContext) return;
            state.castContext.sendCustomMessage(WEBRTC_NAMESPACE, undefined, message);
        }

        function sendMediaStatus(requestId, playerState) {
            if (!state.castContext) return;

            const activeElement =
                state.activeMode === 'video' ? remoteVideo :
                state.activeMode === 'audio' ? audioPlayer :
                null;

            const currentTime = activeElement && Number.isFinite(activeElement.currentTime) ? activeElement.currentTime : 0;
            const volumeLevel =
                activeElement && typeof activeElement.volume === 'number' && Number.isFinite(activeElement.volume)
                    ? activeElement.volume
                    : 1;
            const muted =
                activeElement && typeof activeElement.muted === 'boolean'
                    ? activeElement.muted
                    : false;

            state.castContext.sendCustomMessage(MEDIA_NAMESPACE, undefined, {
                type: 'MEDIA_STATUS',
                requestId: requestId || 0,
                status: [{
                    mediaSessionId: 1,
                    playbackRate: 1,
                    playerState,
                    currentTime,
                    supportedMediaCommands: 15,
                    volume: {
                        level: volumeLevel,
                        muted
                    }
                }]
            });
        }

        function applyVideoLayout() {
            const videoW = remoteVideo.videoWidth || 0;
            const videoH = remoteVideo.videoHeight || 0;
            const screenW = window.innerWidth;
            const screenH = window.innerHeight;
            const isLandscapeDisplay = screenW > screenH;
            const isPortraitEncoded = videoW > 0 && videoH > 0 && videoH > videoW;

            let effectiveRotationDeg = 0;
            if ((state.orientationValue === 6 || state.orientationValue === 8) && isLandscapeDisplay && isPortraitEncoded) {
                effectiveRotationDeg = state.orientationValue === 6 ? -90 : 90;
            } else if (state.orientationValue === 3) {
                effectiveRotationDeg = 180;
            }

            const rightAngle = Math.abs(effectiveRotationDeg) === 90;
            remoteVideo.style.objectFit = 'contain';
            remoteVideo.style.width = rightAngle ? '100vh' : '100vw';
            remoteVideo.style.height = rightAngle ? '100vw' : '100vh';
            remoteVideo.style.transform = 'translate(-50%, -50%) rotate(' + effectiveRotationDeg + 'deg)';
        }

        function applyOrientationMessage(value) {
            state.orientationValue = Number(value) || 1;
            console.log('[ReceiverV2] orientation=' + state.orientationValue);
            applyVideoLayout();
        }

        function resetVideoTelemetry() {
            state.hasRenderedVideoFrame = false;
            state.lastRenderedFrameAtMs = 0;
            state.lastRenderedFrameCount = 0;
        }

        function requestVideoRecovery(reason) {
            if (state.activeMode !== 'video') return;
            const now = Date.now();
            if (now - state.lastRecoveryRequestAtMs < 800) return;
            state.lastRecoveryRequestAtMs = now;
            setReceiverState('render-stalled', `reason=${reason}`);
            sendWebRTCMessage({
                type: 'requestKeyFrame',
                reason
            });
        }

        function startVideoTelemetry() {
            if (state.renderTelemetryStarted) return;
            state.renderTelemetryStarted = true;

            ['play', 'playing', 'pause', 'waiting', 'stalled', 'ended', 'error'].forEach((eventName) => {
                remoteVideo.addEventListener(eventName, () => {
                    console.log(`[ReceiverV2Video] event=${eventName} paused=${remoteVideo.paused} readyState=${remoteVideo.readyState} currentTime=${remoteVideo.currentTime.toFixed(3)}`);
                    if (state.activeMode !== 'video') return;
                    if (eventName === 'play' || eventName === 'playing') {
                        state.lastRenderedFrameAtMs = Date.now();
                        sendMediaStatus(0, 'PLAYING');
                    } else if (eventName === 'pause') {
                        sendMediaStatus(0, 'PAUSED');
                    } else if (eventName === 'stalled' || eventName === 'error') {
                        requestVideoRecovery(`video_event_${eventName}`);
                    } else if (eventName === 'ended') {
                        sendMediaStatus(0, 'IDLE');
                    }
                });
            });

            if (typeof remoteVideo.requestVideoFrameCallback === 'function') {
                const onFrame = (_, metadata) => {
                    state.hasRenderedVideoFrame = true;
                    state.lastRenderedFrameAtMs = Date.now();
                    if (metadata.presentedFrames === 1) {
                        setReceiverState('first-frame-rendered');
                    }
                    remoteVideo.requestVideoFrameCallback(onFrame);
                };
                remoteVideo.requestVideoFrameCallback(onFrame);
            } else {
                setInterval(() => {
                    const quality = typeof remoteVideo.getVideoPlaybackQuality === 'function'
                        ? remoteVideo.getVideoPlaybackQuality()
                        : null;
                    const renderedFrames =
                        quality && Number.isFinite(quality.totalVideoFrames)
                            ? quality.totalVideoFrames
                            : (typeof remoteVideo.webkitDecodedFrameCount === 'number'
                                ? remoteVideo.webkitDecodedFrameCount
                                : 0);
                    if (renderedFrames > state.lastRenderedFrameCount) {
                        state.hasRenderedVideoFrame = true;
                        state.lastRenderedFrameCount = renderedFrames;
                        state.lastRenderedFrameAtMs = Date.now();
                        if (renderedFrames === 1) {
                            setReceiverState('first-frame-rendered');
                        }
                    }
                }, 250);
            }

            setInterval(() => {
                if (state.activeMode !== 'video') return;
                if (!state.hasRenderedVideoFrame) return;
                if (remoteVideo.paused || remoteVideo.readyState < 2) return;
                const gapMs = Date.now() - state.lastRenderedFrameAtMs;
                if (gapMs >= 1500) {
                    requestVideoRecovery('render_stall');
                }
            }, 1000);
        }

        function cleanupPeerConnection() {
            if (state.peerConnection) {
                try {
                    state.peerConnection.close();
                } catch (_) {}
                state.peerConnection = null;
            }
        }

        function switchToVideoMode() {
            state.activeMode = 'video';
            state.activeVideoStream = null;
            resetVideoTelemetry();
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            audioPlayer.src = '';
            audioVisualizer.style.display = 'none';
            remoteVideo.style.display = 'block';
            setReceiverState('awaiting-first-frame');
        }

        function switchToAudioMode() {
            state.activeMode = 'audio';
            cleanupPeerConnection();
            state.activeVideoStream = null;
            remoteVideo.pause();
            remoteVideo.srcObject = null;
            remoteVideo.style.display = 'none';
            audioVisualizer.style.display = 'block';
            resetVideoTelemetry();
            setReceiverState('detached');
        }

        function initializePeerConnection() {
            cleanupPeerConnection();
            state.peerConnection = new RTCPeerConnection(rtcConfig);
            switchToVideoMode();

            state.peerConnection.ontrack = (event) => {
                updateStatus('Received video track');
                const stream = event.streams && event.streams[0]
                    ? event.streams[0]
                    : (() => {
                        const fallback = new MediaStream();
                        fallback.addTrack(event.track);
                        return fallback;
                    })();

                state.activeVideoStream = stream;
                remoteVideo.srcObject = stream;
                remoteVideo.style.display = 'block';
                remoteVideo.play().catch((error) => {
                    console.warn('[ReceiverV2] remoteVideo.play() failed:', error);
                });
                applyVideoLayout();
                startVideoTelemetry();
                updateStatus('Streaming video');
            };

            state.peerConnection.onicecandidate = (event) => {
                if (!event.candidate) return;
                sendWebRTCMessage({
                    type: 'iceCandidate',
                    candidate: event.candidate.candidate,
                    sdpMid: event.candidate.sdpMid,
                    sdpMLineIndex: event.candidate.sdpMLineIndex
                });
            };

            state.peerConnection.onconnectionstatechange = () => {
                const connectionState = state.peerConnection ? state.peerConnection.connectionState : 'closed';
                console.log('[ReceiverV2] connection=' + connectionState);
                updateStatus('Connection: ' + connectionState);
                if (connectionState === 'connected') {
                    setReceiverState('receiver-ready');
                    updateStatus('🎥 Connected - Streaming');
                } else if (connectionState === 'failed') {
                    setReceiverState('render-stalled', 'reason=peer_failed');
                }
            };
        }

        async function handleOffer(data) {
            try {
                updateStatus('Processing offer...');
                initializePeerConnection();
                const offer = new RTCSessionDescription({ type: 'offer', sdp: data.sdp });
                await state.peerConnection.setRemoteDescription(offer);
                const answer = await state.peerConnection.createAnswer();
                await state.peerConnection.setLocalDescription(answer);
                sendWebRTCMessage({ type: 'answer', sdp: answer.sdp });
                updateStatus('Answer sent, establishing connection...');
            } catch (error) {
                console.error('[ReceiverV2] Error handling offer:', error);
                updateStatus('❌ Error: ' + error.message);
                setReceiverState('detached', 'reason=offer_error');
            }
        }

        async function handleIceCandidate(data) {
            if (!state.peerConnection) return;
            try {
                await state.peerConnection.addIceCandidate(new RTCIceCandidate({
                    candidate: data.candidate,
                    sdpMid: data.sdpMid,
                    sdpMLineIndex: data.sdpMLineIndex
                }));
            } catch (error) {
                console.error('[ReceiverV2] ICE candidate error:', error);
            }
        }

        function handleWebRTCMessage(event) {
            try {
                const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
                switch (data.type) {
                case 'offer':
                    handleOffer(data);
                    break;
                case 'iceCandidate':
                    handleIceCandidate(data);
                    break;
                case 'orientation':
                    applyOrientationMessage(data.value);
                    break;
                default:
                    console.log('[ReceiverV2] Unknown WebRTC message type:', data.type);
                }
            } catch (error) {
                console.error('[ReceiverV2] Error parsing WebRTC message:', error);
            }
        }

        function handleMediaLoad(data) {
            const media = data.media || {};
            const contentId = media.contentId;
            if (!contentId) {
                updateStatus('❌ No audio URL provided');
                return;
            }

            state.currentRequestId = data.requestId || 0;
            switchToAudioMode();
            audioPlayer.src = contentId;
            audioPlayer.load();

            audioPlayer.oncanplay = () => {
                audioPlayer.play().then(() => {
                    updateStatus('🎵 Playing audio');
                    sendMediaStatus(state.currentRequestId, 'PLAYING');
                }).catch((error) => {
                    updateStatus('❌ Playback error: ' + error.message);
                    sendMediaStatus(state.currentRequestId, 'IDLE');
                });
            };

            audioPlayer.onerror = () => {
                updateStatus('❌ Audio load error');
                sendMediaStatus(state.currentRequestId, 'IDLE');
            };
        }

        function handleMediaCommand(event) {
            try {
                const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
                switch (data.type) {
                case 'LOAD':
                    handleMediaLoad(data);
                    break;
                case 'PLAY':
                    if (state.activeMode === 'video') {
                        remoteVideo.play().catch(() => {});
                    } else if (state.activeMode === 'audio') {
                        audioPlayer.play().catch(() => {});
                    }
                    sendMediaStatus(data.requestId, 'PLAYING');
                    break;
                case 'PAUSE':
                    if (state.activeMode === 'video') {
                        remoteVideo.pause();
                    } else if (state.activeMode === 'audio') {
                        audioPlayer.pause();
                    }
                    sendMediaStatus(data.requestId, 'PAUSED');
                    break;
                case 'STOP':
                    cleanupSession();
                    sendMediaStatus(data.requestId, 'IDLE');
                    break;
                case 'GET_STATUS':
                    if (state.activeMode === 'video') {
                        sendMediaStatus(data.requestId, remoteVideo.paused ? 'PAUSED' : 'PLAYING');
                    } else if (state.activeMode === 'audio') {
                        sendMediaStatus(data.requestId, audioPlayer.paused ? 'PAUSED' : 'PLAYING');
                    } else {
                        sendMediaStatus(data.requestId, 'IDLE');
                    }
                    break;
                default:
                    console.log('[ReceiverV2] Unknown media command:', data.type);
                }
            } catch (error) {
                console.error('[ReceiverV2] Media command error:', error);
            }
        }

        function cleanupSession() {
            cleanupPeerConnection();
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            audioPlayer.src = '';
            remoteVideo.pause();
            remoteVideo.srcObject = null;
            remoteVideo.style.display = 'none';
            audioVisualizer.style.display = 'none';
            state.activeVideoStream = null;
            state.activeMode = null;
            resetVideoTelemetry();
            setReceiverState('detached');
        }

        window.addEventListener('load', () => {
            updateStatus('Initializing Cast Receiver V2...');
            window.addEventListener('resize', applyVideoLayout);

            const context = cast.framework.CastReceiverContext.getInstance();
            state.castContext = context;

            context.addEventListener(cast.framework.system.EventType.SENDER_CONNECTED, () => {
                updateStatus('📱 Sender connected - Ready');
                setReceiverState('launching');
            });

            context.addEventListener(cast.framework.system.EventType.SENDER_DISCONNECTED, () => {
                updateStatus('Sender disconnected');
                cleanupSession();
            });

            context.addCustomMessageListener(WEBRTC_NAMESPACE, handleWebRTCMessage);
            context.addCustomMessageListener(MEDIA_NAMESPACE, handleMediaCommand);

            const options = new cast.framework.CastReceiverOptions();
            options.disableIdleTimeout = true;
            context.start(options);
            updateStatus('✅ Ready for Audio or Video');
        });
    </script>
</body>
</html>
